<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Build-your-own-2d-game</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <canvas id="viewport" aria-label="Game viewport"></canvas>
  <div id="hud">
    <div class="title">Draw-While-Moving</div>
    <div class="hint">Move: WASD or Arrow Keys</div>
    <div class="hint">Hold Space to draw</div>
    <div class="hint dim">C: Clear world • R: Random color • [ / ]: Brush size</div>
  </div>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
